  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{{ accent }};\">USER-CENTERED<\u002Fspan><br>EXPERIENCES<\u002Fspan>\n      <div style=\"display:flex;flex-direction:row;gap:40px;align-items:flex-end;flex-wrap:wrap;justify-content:space-between;\">\n        <span style=\"font-family:'Poppins',sans-serif;font-weight:400;font-size:18px;line-height:1.6;color:rgb(203,203,203);max-width:520px;\">Over 5 years turning user research into interfaces that move real numbers — across civic-tech, fintech and mental health.<\u002Fspan>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;\">\n          <a href=\"Projects.dc.html\" style=\"display:flex;align-items:center;justify-content:center;padding:16px 32px;border-radius:100px;background:{{ accent }};font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:rgb(1,2,8);text-decoration:none;white-space:nowrap;\">View My Work<\u002Fa>\n          <a href=\"Contact.dc.html\" style=\"display:flex;align-items:center;justify-content:center;padding:16px 32px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.3);font-family:'Syne',sans-serif;font-weight:600;font-size:16px;color:rgb(255,255,255);text-decoration:none;white-space:nowrap;\">Get In Touch<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:row;gap:0;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,0.1);padding-top:32px;\">\n        <sc-for list=\"{{ stats }}\" as=\"stat\" hint-placeholder-count=\"4\">\n          <div style=\"flex:1 1 160px;display:flex;flex-direction:column;gap:6px;padding:0 24px;border-left:1px solid rgba(255,255,255,0.1);\">\n            <span style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:32px;color:rgb(255,255,255);\">{{ stat.value }}<\u002Fspan>\n            <span style=\"font-family:'Poppins',sans-serif;font-weight:400;font-size:14px;color:rgb(203,203,203);\">{{ stat.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ isEditorialHero }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:96px clamp(24px,5vw,100px) 80px;display:flex;flex-direction:column;box-sizing:border-box;\">\n    <div style=\"max-width:900px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:32px;\">\n      <span style=\"font-family:'Syne',sans-serif;font-weight:500;font-size:clamp(28px,4vw,44px);line-height:1.5;color:rgb(255,255,255);\">I'm a UI/UX designer who designs <span style=\"color:{{ accent }};font-weight:600;\">user-centered<\u002Fspan> experiences \\u2014 over five years turning research into interfaces that move real numbers across civic-tech, fintech and mental health.<\u002Fspan>\n      <div style=\"display:flex;flex-direction:row;gap:32px;align-items:center;flex-wrap:wrap;\">\n        <a href=\"Projects.dc.html\" style=\"font-family:'Syne',sans-serif;font-weight:600;font-size:16px;color:{{ accent }};text-decoration:underline;\">View My Work<\u002Fa>\n        <a href=\"Contact.dc.html\" style=\"font-family:'Syne',sans-serif;font-weight:600;font-size:16px;color:rgb(255,255,255);text-decoration:underline;\">Get In Touch<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:row;gap:32px;flex-wrap:wrap;padding-top:24px;border-top:1px solid rgba(255,255,255,0.1);\">\n        <sc-for list=\"{{ stats }}\" as=\"stat\" hint-placeholder-count=\"4\">\n          <span style=\"font-family:'Poppins',sans-serif;font-weight:400;font-size:14px;color:rgb(203,203,203);\"><span style=\"font-family:'Syne',sans-serif;font-weight:700;color:rgb(255,255,255);\">{{ stat.value }}<\u002Fspan>&nbsp;{{ stat.label }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- EXPERTISE -->\n  <div style=\"padding:64px clamp(24px,5vw,100px);display:flex;flex-direction:column;box-sizing:border-box;\">\n    <div style=\"max-width:1240px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:40px;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"width:10px;height:10px;border-radius:50%;background:{{ accent }};display:inline-block;\"><\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:40px;color:rgb(255,255,255);\">Expertise<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:row;gap:24px;flex-wrap:wrap;\">\n        <sc-for list=\"{{ expertise }}\" as=\"card\" hint-placeholder-count=\"3\">\n          <div style=\"flex:1 1 280px;display:flex;flex-direction:column;gap:16px;padding:{{ cardPadding }};border-radius:{{ cardRadius }};background:{{ cardBg }};border:{{ cardBorder }};\">\n            <span style=\"font-family:'Syne',sans-serif;font-weight:600;font-size:24px;color:rgb(255,255,255);\">{{ card.title }}<\u002Fspan>\n            <span style=\"font-family:'Poppins',sans-serif;font-weight:400;font-size:16px;line-height:1.6;color:rgb(203,203,203);\">{{ card.body }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FEATURED WORK -->\n  <div style=\"padding:64px clamp(24px,5vw,100px);display:flex;flex-direction:column;box-sizing:border-box;\">\n    <div style=\"max-width:1240px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:32px;\">\n      <div style=\"display:flex;flex-direction:row;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <span style=\"width:10px;height:10px;border-radius:50%;background:{{ accent }};display:inline-block;\"><\u002Fspan>\n          <span style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:40px;color:rgb(255,255,255);\">Featured Work<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"Projects.dc.html\" style=\"font-family:'Syne',sans-serif;font-weight:500;font-size:18px;color:rgb(255,255,255);text-decoration:underline;\">view all<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:32px;\">\n        <sc-for list=\"{{ featured }}\" as=\"proj\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;flex-direction:column;border-radius:{{ cardRadius }};background:{{ cardBg }};border:{{ cardBorder }};overflow:hidden;\">\n            <div style=\"margin:20px;min-height:260px;border-radius:16px;background:rgb(6,8,14);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;\">\n              <span style=\"font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,4vw,44px);color:rgba(255,255,255,0.14);\">{{ proj.name }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:0 32px 32px;display:flex;flex-direction:column;gap:20px;\">\n              <span style=\"font-family:'Syne',sans-serif;font-weight:600;font-size:clamp(20px,2.4vw,26px);line-height:1.3;color:rgb(255,255,255);max-width:560px;\">{{ proj.headline }}<\u002Fspan>\n              <div style=\"display:flex;flex-direction:row;gap:48px;flex-wrap:wrap;\">\n                <sc-for list=\"{{ proj.stats }}\" as=\"stat\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex;flex-direction:column;gap:4px;\">\n                    <div style=\"display:flex;flex-direction:row;align-items:baseline;gap:8px;\">\n                      <span style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:24px;color:rgb(255,255,255);\">{{ stat.before }}<\u002Fspan>\n                      <span style=\"font-family:'Syne',sans-serif;font-weight:400;font-size:18px;color:rgb(203,203,203);\">→<\u002Fspan>\n                      <span style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:24px;color:{{ accent }};\">{{ stat.after }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <span style=\"font-family:'Poppins',sans-serif;font-weight:500;font-size:11px;letter-spacing:0.08em;color:rgb(203,203,203);text-transform:uppercase;\">{{ stat.label }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid rgba(255,255,255,0.08);\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:row;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;\">\n                <span style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.08em;color:rgb(203,203,203);text-transform:uppercase;\">{{ proj.role }}<\u002Fspan>\n                <a href=\"{{ proj.href }}\" style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.04em;color:{{ accent }};text-transform:uppercase;text-decoration:none;white-space:nowrap;\">Case Study ↗<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TESTIMONIAL -->\n  <dc-import name=\"Testimonial\" style=\"position:relative;\" hint-size=\"100%,320px\"><\u002Fdc-import>\n\n  <!-- FAQ -->\n  <div style=\"padding:64px clamp(24px,5vw,100px) 96px;display:flex;flex-direction:column;box-sizing:border-box;\">\n    <div style=\"max-width:1240px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:32px;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"width:10px;height:10px;border-radius:50%;background:{{ accent }};display:inline-block;\"><\u002Fspan>\n        <span style=\"font-family:'Syne',sans-serif;font-weight:700;font-size:40px;color:rgb(255,255,255);\">Frequently Asked Questions<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;\">\n        <sc-for list=\"{{ faqs }}\" as=\"faq\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ faq.toggle }}\" style=\"cursor:pointer;padding:24px 0;border-top:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;gap:12px;\">\n            <div style=\"display:flex;flex-direction:row;justify-content:space-between;align-items:center;gap:16px;\">\n              <span style=\"font-family:'Syne',sans-serif;font-weight:600;font-size:20px;color:rgb(255,255,255);\">{{ faq.q }}<\u002Fspan>\n              <span style=\"font-family:'Syne',sans-serif;font-weight:600;font-size:24px;color:{{ accent }};flex-shrink:0;\">{{ faq.icon }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ faq.open }}\">\n              <span style=\"font-family:'Poppins',sans-serif;font-weight:400;font-size:16px;line-height:1.6;color:rgb(203,203,203);max-width:800px;\">{{ faq.a }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <dc-import name=\"Footer\" style=\"position:relative;\" hint-size=\"100%,320px\"><\u002Fdc-import>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentTheme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Orange&quot;, &quot;options&quot;: [&quot;Orange&quot;, &quot;Violet&quot;, &quot;Blue&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Tweaks&quot;}, &quot;heroStyle&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Bold Statement&quot;, &quot;options&quot;: [&quot;Bold Statement&quot;, &quot;Quiet Editorial&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Tweaks&quot;}, &quot;cardStyle&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Filled Cards&quot;, &quot;options&quot;: [&quot;Filled Cards&quot;, &quot;Outlined Minimal&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Tweaks&quot;}}\">\nclass Component extends DCLogic {\n  state = { openFaq: 0 };\n\n  renderVals() {\n    const accentMap = { Orange: 'rgb(255,128,74)', Violet: 'rgb(168,130,255)', Blue: 'rgb(94,160,255)' };\n    const accent = accentMap[this.props.accentTheme] || accentMap.Orange;\n    const heroStyle = this.props.heroStyle || 'Bold Statement';\n    const isBoldHero = heroStyle === 'Bold Statement';\n    const isEditorialHero = !isBoldHero;\n    const cardStyle = this.props.cardStyle || 'Filled Cards';\n    const isFilled = cardStyle === 'Filled Cards';\n    const cardPadding = isFilled ? '32px' : '0 0 28px 0';\n    const cardRadius = isFilled ? '16px' : '0px';\n    const cardBg = isFilled ? 'rgba(255,255,255,0.03)' : 'transparent';\n    const cardBorder = isFilled ? '1px solid rgba(255,255,255,0.08)' : 'none';\n\n    const stats = [\n      { value: '5+', label: 'Years of experience' },\n      { value: '89%', label: 'Voter turnout lifted at Voterix' },\n      { value: '1,939', label: 'Students served via GoChow' },\n      { value: '4', label: 'End-to-end product case studies' },\n    ];\n\n    const expertise = [\n      { title: 'User Research', body: 'Interviews, surveys, and usability testing that turn assumptions into evidence before a single pixel is placed.' },\n      { title: 'UI/UX Design', body: 'Low-fidelity wireframes to high-fidelity, component-based prototypes in Figma \\u2014 built to hand off clean.' },\n      { title: 'Testing & Iteration', body: 'Moderated usability testing and iteration on flows, labels, and copy until the right action is the obvious one.' },\n    ];\n\n    const featured = [\n      {\n        name: 'Voterix',\n        href: 'Case-Study-Voterix.dc.html',\n        headline: 'Making campus voting so simple people actually vote',\n        role: 'Founder & Product Designer',\n        stats: [\n          { before: '50%', after: '89%', label: 'Voter turnout \\u00b7 NUAMS' },\n          { before: '500', after: '596', label: 'Voters \\u00b7 NACOS' },\n        ],\n      },\n      {\n        name: 'Health4Moni',\n        href: 'Case-Study-Health4Moni.dc.html',\n        headline: 'Turning a confusing insurance sign-up into a checkout people finish',\n        role: 'Product Designer (Intern)',\n        stats: [\n          { before: 'Low-fi', after: 'Hi-fi', label: 'Prototype fidelity' },\n          { before: '0', after: '5', label: 'Users usability-tested' },\n        ],\n      },\n    ];\n\n    const faqData = [\n      { q: 'What does your design process look like?', a: 'I start by framing the problem \\u2014 stakeholder interviews, heuristic and competitive audits \\u2014 before touching a wireframe. Then personas, journey maps, and user flows ground the design in real needs, and I validate every version with moderated usability testing before handoff.' },\n      { q: 'What tools do you design with?', a: 'Figma and FigJam for design and collaboration, with Maze and Google Forms for testing and surveys.' },\n      { q: 'Do you only design, or do you also think about the business side?', a: 'Both \\u2014 as a startup COO I\\u2019ve owned product and operations end to end, so I design with an eye on the metric a screen is meant to move, not just how it looks.' },\n      { q: 'Are you open to freelance or full-time roles?', a: 'Yes to both. Reach out on the Contact page and I\\u2019ll get back to you quickly.' },\n    ];\n    const openFaq = this.state.openFaq;\n    const faqs = faqData.map((f, i) => ({\n      ...f,\n      open: openFaq === i,\n      icon: openFaq === i ? '\\u2212' : '+',\n      toggle: () => this.setState({ openFaq: openFaq === i ? -1 : i }),\n    }));\n\n    return { stats, expertise, featured, faqs, accent, isBoldHero, isEditorialHero, cardPadding, cardRadius, cardBg, cardBorder };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
